<body class="bg-[#F7F4EA] min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Header -->
<header class="w-full px-4 py-1 bg-transparent sticky top-0 z-10"><div class="flex items-center justify-between w-full h-14 gap-2">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest text-primary soft-shadow hover:scale-110 transition-transform shrink-0">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex items-center gap-3 min-w-0 flex-grow justify-center">
<h1 class="font-headline-md text-body-lg text-on-surface truncate whitespace-nowrap">Qua đường an toàn</h1>
<div class="flex items-center gap-1.5 bg-surface-container-lowest px-2.5 py-1 rounded-full soft-shadow shrink-0 translate-x-[5px]"><span class="font-label-caps text-[10px] text-on-surface-variant">1/5</span></div>
</div>
<button aria-label="Listen to instructions" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container soft-shadow hover:scale-110 transition-transform shrink-0">
<span class="material-symbols-outlined text-2xl">volume_up</span>
</button>
</div></header>
<!-- Main Content Stage -->
<main class="flex-grow flex flex-col px-container-padding pb-32 max-w-2xl mx-auto w-full relative z-0">
<!-- Instruction -->
<div class="text-center mt-6 mb-8"><h2 class="font-headline-md text-headline-md text-primary">Sắp xếp 3 bước an toàn</h2></div>
<!-- Order Area (Drop Zones) -->
<div class="bg-surface-container-lowest rounded-xl p-6 soft-shadow mb-8 border-2 border-surface-variant border-dashed"><h3 class="font-label-caps text-label-caps text-on-surface-variant mb-4 text-center">Thứ tự của con</h3><div class="flex justify-center gap-4"><div class="w-16 h-16 rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant flex items-center justify-center font-display-lg-mobile text-on-surface-variant opacity-50">1</div><div class="w-16 h-16 rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant flex items-center justify-center font-display-lg-mobile text-on-surface-variant opacity-50">2</div><div class="w-16 h-16 rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant flex items-center justify-center font-display-lg-mobile text-on-surface-variant opacity-50">3</div></div></div>
<!-- Step Cards (Draggable/Selectable Items) -->
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-4 text-center">Chọn bước</h3>
<div class="flex flex-col gap-4"><button class="w-full bg-surface-container-lowest rounded-lg px-4 h-14 flex items-center gap-4 soft-shadow hover:scale-[1.02] transition-transform text-left border-2 border-transparent hover:border-primary-container focus:outline-none"><div class="w-10 h-10 bg-error-container text-on-error-container rounded-full flex items-center justify-center shrink-0"><span class="text-xl">✋</span></div><span class="font-body-md text-on-surface flex-grow">Dừng lại</span></button><button class="w-full bg-surface-container-lowest rounded-lg px-4 h-14 flex items-center gap-4 soft-shadow hover:scale-[1.02] transition-transform text-left border-2 border-transparent hover:border-primary-container focus:outline-none"><div class="w-10 h-10 bg-tertiary-container text-on-tertiary-container rounded-full flex items-center justify-center shrink-0"><span class="text-xl">🤝</span></div><span class="font-body-md text-on-surface flex-grow">Nắm tay người lớn</span></button><button class="w-full bg-surface-container-lowest rounded-lg px-4 h-14 flex items-center gap-4 soft-shadow hover:scale-[1.02] transition-transform text-left border-2 border-transparent hover:border-primary-container focus:outline-none"><div class="w-10 h-10 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center shrink-0"><span class="text-xl">🚦</span></div><span class="font-body-md text-on-surface flex-grow">Chờ an toàn rồi đi</span></button></div>
</div>
<!-- Feedback Area -->
<div class="mt-8 text-center bg-surface-container-lowest rounded-lg p-4 soft-shadow flex items-center justify-center gap-3"><p class="font-body-md text-primary font-bold">Con chọn bước đầu tiên nhé.</p></div>
</main>
<!-- Bottom Actions (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-xl p-container-padding shadow-[0_-4px_20px_rgba(115,92,0,0.1)] flex justify-between items-center gap-4 z-50"><button class="flex items-center justify-center gap-2 px-6 py-3 rounded-full border-2 border-outline text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-variant transition-colors"><span class="material-symbols-outlined text-xl">lightbulb</span>Gợi ý</button><button class="flex-grow flex items-center justify-center px-8 py-3 rounded-full bg-surface-variant text-on-surface-variant font-headline-md text-headline-md disabled-shadow cursor-not-allowed opacity-70" disabled="">Kiểm tra</button></div>
