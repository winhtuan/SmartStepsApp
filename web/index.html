<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="smartsteps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>smartsteps</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-indicator">
    <div class="spinner"></div>
    <p style="margin-top: 16px; font-weight: bold; color: #25324B;">Đang tải SmartSteps...</p>
  </div>

  <style>
    #loading-indicator {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #FFF1B5; /* Màu nền chủ đạo của app (DuoColors.background) */
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-family: sans-serif; z-index: 9999;
    }
    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #f3f3f3; border-top: 5px solid #FF8F00; /* Màu cam vàng nổi bật */
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
