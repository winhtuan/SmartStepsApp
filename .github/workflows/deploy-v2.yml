name: Deploy SmartSteps v2.0

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smartsteps-v2-deploy
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Build and deploy web artifact
    runs-on: [self-hosted, Windows]
    env:
      FLUTTER_BIN: C:\Users\winhtuan\flutter\bin

    steps:
      - name: Checkout SmartStepsApp
        uses: actions/checkout@v4

      - name: Add Flutter to PATH
        shell: powershell
        run: |
          Write-Host "Current user:"
          whoami

          Write-Host "Current location:"
          Get-Location

          Write-Host "FLUTTER_BIN=$env:FLUTTER_BIN"

          $flutterBat = Join-Path $env:FLUTTER_BIN "flutter.bat"
          Write-Host "Checking: $flutterBat"

          Write-Host "Test path result:"
          Test-Path $flutterBat

          if (!(Test-Path $flutterBat)) {
            Write-Host "Folder content:"
            if (Test-Path $env:FLUTTER_BIN) {
              Get-ChildItem $env:FLUTTER_BIN
            } else {
              Write-Host "FLUTTER_BIN folder not found"
            }

            exit 1
          }

          Add-Content -Path $env:GITHUB_PATH -Value $env:FLUTTER_BIN
          Write-Host "Flutter added to PATH"

      - name: Verify Flutter
        shell: cmd
        run: flutter --version

      - name: Install dependencies
        shell: cmd
        run: flutter pub get

      - name: Build Flutter web
        shell: cmd
        run: flutter build web --base-href "/smartsteps-v2/" --release --dart-define=FLUTTER_WEB_AUTO_DETECT=false

      - name: Checkout SmartSteps v2 deploy repository
        uses: actions/checkout@v4
        with:
          repository: winhtuan/smartsteps-v2
          token: ${{ secrets.SMARTSTEPS_V2_DEPLOY_TOKEN }}
          path: smartsteps-v2

      - name: Deploy to smartsteps-v2 repository
        shell: cmd
        run: |
          if not exist "%GITHUB_WORKSPACE%\build\web" exit /b 1
          cd /d "%GITHUB_WORKSPACE%\smartsteps-v2"
          git clean -fdx
          xcopy "%GITHUB_WORKSPACE%\build\web\*" "%GITHUB_WORKSPACE%\smartsteps-v2\" /E /H /Y /I

      - name: Commit and push smartsteps-v2
        shell: cmd
        working-directory: smartsteps-v2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all

          git diff --cached --quiet && exit /b 0
          git commit -m "Deploy SmartSteps web build from %GITHUB_SHA%"
          git push
