name: Deploy SmartSteps v2.0

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smartsteps-v2-deploy
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Build and deploy web artifact
    runs-on: [self-hosted, Windows]

    env:
      FLUTTER_BIN: 'F:\EXE\flutter\bin'

    steps:
      - name: Checkout SmartStepsApp
        uses: actions/checkout@v4

      - name: Add Flutter to PATH
        shell: cmd
        run: |
          echo Current user:
          whoami

          echo Current directory:
          cd

          echo FLUTTER_BIN=%FLUTTER_BIN%
          echo Checking: %FLUTTER_BIN%\flutter.bat

          if not exist "%FLUTTER_BIN%\flutter.bat" (
            echo Flutter not found at %FLUTTER_BIN%\flutter.bat
            echo Folder content:
            dir "%FLUTTER_BIN%"
            exit /b 1
          )

          echo %FLUTTER_BIN%>> "%GITHUB_PATH%"
          echo Flutter added to PATH

      - name: Trust Flutter SDK git directory
        shell: cmd
        run: |
          git config --global --add safe.directory F:/EXE/flutter
          git config --global --get-all safe.directory

      - name: Verify Flutter
        shell: cmd
        run: |
          flutter --version

      - name: Install dependencies
        shell: cmd
        run: |
          flutter pub get

      - name: Build Flutter web
        shell: cmd
        run: |
          flutter build web --base-href "/smartsteps-v2/" --release --dart-define=FLUTTER_WEB_AUTO_DETECT=false

      - name: Checkout SmartSteps v2 deploy repository
        uses: actions/checkout@v4
        with:
          repository: winhtuan/smartsteps-v2
          token: ${{ secrets.SMARTSTEPS_V2_DEPLOY_TOKEN }}
          path: smartsteps-v2

      - name: Deploy to smartsteps-v2 repository
        shell: cmd
        run: |
          if not exist "%GITHUB_WORKSPACE%\build\web" (
            echo Build folder not found: %GITHUB_WORKSPACE%\build\web
            exit /b 1
          )

          cd /d "%GITHUB_WORKSPACE%\smartsteps-v2"

          git clean -fdx

          xcopy "%GITHUB_WORKSPACE%\build\web\*" "%GITHUB_WORKSPACE%\smartsteps-v2\" /E /H /Y /I

      - name: Commit and push smartsteps-v2
        shell: cmd
        working-directory: smartsteps-v2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all

          git diff --cached --quiet
          if %ERRORLEVEL% EQU 0 (
            echo No changes to commit
            exit /b 0
          )

          git commit -m "Deploy SmartSteps web build from %GITHUB_SHA%"
          git push