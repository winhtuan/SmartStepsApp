<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SmartSteps - Try Again Feedback</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#735c00",
                        "on-primary": "#ffffff",
                        "outline-variant": "#d0c6ae",
                        "surface-dim": "#dcdad2",
                        "primary-fixed": "#ffe087",
                        "on-error-container": "#93000a",
                        "secondary": "#006e1c",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-primary-container": "#735c00",
                        "tertiary-fixed-dim": "#ffb870",
                        "tertiary-fixed": "#ffdcbe",
                        "surface-container-high": "#eae8e0",
                        "primary-fixed-dim": "#ebc23e",
                        "on-primary-fixed-variant": "#574500",
                        "primary-container": "#ffd54f",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f5f4ec",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#94f990",
                        "surface-variant": "#e4e3db",
                        "surface": "#fbf9f1",
                        "on-surface-variant": "#4d4634",
                        "on-primary-fixed": "#241a00",
                        "inverse-on-surface": "#f3f1e9",
                        "on-secondary-container": "#00731e",
                        "tertiary-container": "#ffd1a7",
                        "surface-container": "#f0eee6",
                        "surface-bright": "#fbf9f1",
                        "inverse-surface": "#30312c",
                        "on-tertiary-container": "#8b5100",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#2c1600",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#8b5000",
                        "surface-tint": "#735c00",
                        "surface-container-highest": "#e4e3db",
                        "error": "#ba1a1a",
                        "secondary-container": "#91f78e",
                        "on-secondary-fixed-variant": "#005313",
                        "on-surface": "#1b1c17",
                        "on-background": "#1b1c17",
                        "outline": "#7f7662",
                        "on-secondary-fixed": "#002204",
                        "background": "#fbf9f1",
                        "inverse-primary": "#ebc23e",
                        "secondary-fixed-dim": "#78dc77"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-padding": "32px",
                        "element-gap": "16px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"],
                        "label-caps": ["Nunito Sans"],
                        "display-lg-mobile": ["Nunito Sans"],
                        "display-lg": ["Nunito Sans"],
                        "body-md": ["Nunito Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-lg": ["20px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-caps": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "800" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "40px", "fontWeight": "800" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;
        }
        
        .ambient-shadow {
            box-shadow: 0 8px 32px rgba(115, 92, 0, 0.15);
        }
        
        .btn-shadow {
            box-shadow: 0 6px 0 0 #ebc23e, 0 10px 20px rgba(115, 92, 0, 0.2);
            transition: all 0.1s ease;
        }
        
        .btn-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #ebc23e, 0 4px 10px rgba(115, 92, 0, 0.2);
        }
        
        .btn-outline-shadow {
            box-shadow: 0 4px 0 0 #d0c6ae;
            transition: all 0.1s ease;
        }
        
        .btn-outline-shadow:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #d0c6ae;
        }

        .mascot-bounce {
            animation: bounceSoft 2s infinite ease-in-out;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md h-screen w-screen overflow-hidden relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Full Screen Background Image -->
<div class="absolute inset-0 w-full h-full z-0">
<img class="w-full h-full object-cover opacity-60" data-alt="A soft, warm, blurred background showing a gentle indoor setting like a cozy living room with soft lighting, ideal for a children's app interface backdrop, creating a safe and welcoming atmosphere." src="https://lh3.googleusercontent.com/aida/AP1WRLtdKricf8KE5uXGb_O38tXcG_N3pRCyMXQfHy29c4onhZrlDIDsxRtEcg6y8BasvsqWxXse2zT8sEorbpMXMi4avzRFIj2ququ_pZ5lLI4FvNI-6sRZ5x3vVGdoSCV3l7ificOT2b_wY6VuPgXQYVOr3pLigV8YjhlZy-mUUwP6HL-CZCPVGWO-Eth2PjVx-rj0od4tjHLFlwr7T1JUSIh4vY0d-lMy596gnsD_gDjSqwEBR7wLR3M-Y-Q7">
<!-- Soft gradient overlay to ensure UI readability -->
<div class="absolute inset-0 bg-surface/40 backdrop-blur-[2px]"></div>
</div>
<!-- Top App Bar (Modified for Context) -->
<header class="relative z-10 flex justify-between items-center px-container-padding py-unit w-full max-w-full">
<!-- Progress Stepper (Simulated) -->
<div class="flex items-center gap-2 bg-surface-container-lowest/80 backdrop-blur-md px-4 py-2 rounded-full ambient-shadow">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">pets</span>
<div class="flex gap-1 ml-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant ml-2">2/5</span>
</div>
<div class="flex gap-2">
<button aria-label="Refresh" class="w-12 h-12 bg-surface-container-lowest/80 backdrop-blur-md rounded-full flex items-center justify-center text-on-surface-variant hover:scale-110 transition-transform duration-200 ambient-shadow">
<span class="material-symbols-outlined">refresh</span>
</button>
<button aria-label="Close" class="w-12 h-12 bg-surface-container-lowest/80 backdrop-blur-md rounded-full flex items-center justify-center text-on-surface-variant hover:scale-110 transition-transform duration-200 ambient-shadow">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full h-[calc(100vh-80px)] flex flex-col items-center justify-center px-gutter">
<!-- Feedback Card Container -->
<div class="relative w-full max-w-md mt-16">
<!-- Mascot Overlapping -->
<div class="absolute -top-24 left-1/2 -translate-x-1/2 z-20 w-40 h-40 mascot-bounce flex items-center justify-center">
<!-- Using a decorative background shape behind the mascot as per the style -->
<div class="absolute bottom-4 w-32 h-16 bg-error-container rounded-t-full -z-10"></div>
<img class="w-full h-full object-contain drop-shadow-md" data-alt="A friendly cartoon cat mascot looking slightly concerned or thoughtful, designed with soft shapes and warm colors, acting as a helpful guide for children." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB09-JnJOVtaEA581gU24HdNBiKQRqkdU-cEE4szI6quy6_qKol4Z02IhqDQqXUH6xu3Lk0QcasTbaPRYEuNwahoi14m5a4acqjBrCY0jSavQVQoQ3TcQCM7vAR1YT9d4iOvG7O0lJPDL3YQrsmX9QgVLqG-wHUayke8E18GaKNlc0tDB6y13IIBnh__4ipvrSOGX5H0QksIsbWkfk8EQ3nTzC8Iepswfye7-EyPPGKy9E4e10a2VO5SlDgaZc7S-kpHSqSOkLYtfUT">
</div>
<!-- The Card -->
<div class="bg-surface-container-lowest rounded-xl ambient-shadow p-8 pt-16 flex flex-col items-center text-center relative z-10 border-4 border-surface-container-low">
<!-- Decorative stars -->
<span class="material-symbols-outlined absolute top-6 left-6 text-error-container rotate-12 scale-75" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined absolute top-12 right-6 text-tertiary-container -rotate-12 scale-50" style="font-variation-settings: 'FILL' 1;">star</span>
<!-- Status Label -->
<div class="font-label-caps text-label-caps text-error mb-2 tracking-wider uppercase">
                    Sai rồi
                </div>
<!-- Headline -->
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">
                    Chưa an toàn đâu!
                </h1>
<!-- Subtext -->
<p class="font-body-md text-body-md text-on-surface-variant mb-6">
                    Mình thử cách an toàn hơn nhé.
                </p>
<!-- Warning Box -->
<div class="w-full bg-error-container/50 border border-error-container rounded-lg p-4 flex items-center gap-3 mb-8 text-left">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-body-md text-body-md text-on-surface">Vật này có thể làm con bị đau.</span>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-element-gap">
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-body-lg text-body-lg py-4 rounded-full flex items-center justify-center gap-2 btn-shadow active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">refresh</span>
                        Thử lại
                    </button>
<!-- Secondary CTA -->
<button class="w-full bg-surface-container-lowest border-2 border-outline-variant text-primary font-body-lg text-body-lg py-4 rounded-full flex items-center justify-center gap-2 btn-outline-shadow hover:bg-surface-container-low active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">lightbulb</span>
                        Xem gợi ý
                    </button>
</div>
</div>
</div>
</main>


</body></html>
